<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<!-- CONFIDENTIAL · LAST CALL / MAYA — unreleased WIP. Do not share beyond the invited focus group. -->
<title>LAST CALL — an interactive drama</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --maya-cold:#9db4d4;
  --maya-ice:#e8f1fb;
  --accent:#6f8fff;
  --warn:#e0564f;
  --mono:'IBM Plex Mono',monospace;
  --serif:'Playfair Display',serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#04060c;overflow:hidden}
body{display:flex;align-items:center;justify-content:center;font-family:var(--mono)}

#stage{
  position:relative;
  width:min(100vw,calc(100vh * 9 / 16));
  height:min(100vh,calc(100vw * 16 / 9));
  background:#04060c;overflow:hidden;
  box-shadow:0 0 80px rgba(0,0,0,0.9);
}

/* ---- frame layers (crossfade + ken burns) ---- */
.frame{
  position:absolute;inset:0;
  background-size:cover;background-position:center 40%;   /* bias toward headroom */
  opacity:0;transition:opacity 1.1s ease;
  will-change:transform,opacity;
}
.frame.show{opacity:1;animation:kb 22s ease-out forwards}
@keyframes kb{               /* gentle centered push, no vertical drift — protects composition */
  from{transform:scale(1.0)}
  to{transform:scale(1.055)}
}
.vignette{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(120% 80% at 50% 35%,transparent 40%,rgba(2,4,10,0.55) 100%)}
.grade{position:absolute;inset:0;pointer-events:none;mix-blend-mode:soft-light;
  background:linear-gradient(180deg,rgba(60,110,180,0.20),rgba(10,20,40,0.10))}

/* ---- top HUD ---- */
.hud{position:absolute;top:0;left:0;right:0;padding:16px 18px;z-index:6;
  display:flex;justify-content:space-between;align-items:flex-start;
  font-size:10px;letter-spacing:0.14em;color:rgba(220,235,255,0.55);text-transform:uppercase}
.hud .slug{max-width:60%}
.hud .meta{text-align:right;line-height:1.6}
.timerbar{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.06);z-index:7}
.timerfill{height:100%;width:100%;background:linear-gradient(90deg,var(--accent),var(--warn));
  transform-origin:left;transition:transform 0.1s linear}

/* ---- text plate ---- */
.plate{position:absolute;left:0;right:0;bottom:0;z-index:6;
  padding:26px 22px 26px;
  background:linear-gradient(0deg,rgba(3,5,11,0.96) 0%,rgba(3,5,11,0.82) 55%,transparent 100%)}
.chapter{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--maya-cold);margin-bottom:12px;opacity:0.85}
.line{font-family:var(--serif);font-size:19px;line-height:1.6;color:var(--maya-ice);
  font-style:italic;margin-bottom:10px;min-height:1.6em}
.action{font-size:12.5px;line-height:1.65;color:rgba(205,222,245,0.72);margin-bottom:18px;
  font-family:var(--mono)}
.cursor{display:inline-block;width:7px;height:1.05em;vertical-align:-2px;
  background:var(--maya-ice);margin-left:2px;animation:blink 1s steps(1) infinite;opacity:0.8}
@keyframes blink{50%{opacity:0}}

/* ---- choices ---- */
.choices{display:flex;flex-direction:column;gap:9px}
.choice{appearance:none;border:0.5px solid rgba(140,175,225,0.32);
  background:rgba(20,32,54,0.5);backdrop-filter:blur(6px);
  border-radius:11px;padding:13px 15px;text-align:left;cursor:pointer;
  transition:border-color .18s,background .18s,transform .18s;opacity:0;transform:translateY(8px)}
.choice.in{opacity:1;transform:translateY(0)}
.choice:hover,.choice:focus{border-color:var(--accent);background:rgba(34,52,86,0.7);outline:none}
.choice .ct{display:block;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--maya-cold);margin-bottom:5px}
.choice .cx{display:block;font-size:13.5px;line-height:1.45;color:var(--maya-ice)}
.choice.dim{opacity:0.2;filter:saturate(0.5);transition:opacity .5s,filter .5s}
.choice.chosen{border-color:var(--warn);background:rgba(224,86,79,0.16);
  box-shadow:0 0 22px rgba(224,86,79,0.25);transition:.4s}

/* ---- tap-to-advance hint — a real button, not ambient text ---- */
.tap{position:absolute;right:18px;bottom:20px;z-index:6;font-size:11px;letter-spacing:0.1em;
  text-transform:uppercase;color:rgba(232,241,251,0.92);
  background:rgba(20,32,54,0.55);backdrop-filter:blur(6px);
  border:0.5px solid rgba(140,175,225,0.45);border-radius:20px;padding:9px 16px;
  animation:tappulse 1.8s ease-in-out infinite}
@keyframes tappulse{0%,100%{opacity:0.82}50%{opacity:1}}

/* ---- title / ending overlays ---- */
.curtain{position:absolute;inset:0;z-index:10;background:#04060c;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;transition:opacity 1s ease}
.curtain.hide{opacity:0;pointer-events:none}
/* ending keeps the final frame in view, scrimmed — the climax stays cinematic, not a slide */
#ending{background:linear-gradient(180deg,rgba(4,6,12,0.5) 0%,rgba(4,6,12,0.72) 45%,rgba(4,6,12,0.96) 100%)}
.curtain .mark{font-size:11px;letter-spacing:0.4em;color:var(--maya-cold);text-transform:uppercase;margin-bottom:18px}
.curtain h1{font-family:var(--serif);font-size:46px;font-weight:600;color:var(--maya-ice);
  letter-spacing:0.02em;line-height:1;margin-bottom:16px}
.curtain .tag{font-family:var(--serif);font-style:italic;font-size:15px;color:rgba(205,222,245,0.7);
  max-width:80%;line-height:1.6;margin-bottom:34px}
.btn{appearance:none;border:0.5px solid var(--accent);background:rgba(111,143,255,0.12);
  color:var(--maya-ice);font-family:var(--mono);font-size:12px;letter-spacing:0.1em;
  text-transform:uppercase;padding:13px 26px;border-radius:30px;cursor:pointer;transition:.18s}
.btn:hover{background:var(--accent);color:#04060c}
.btn.ghost{border-color:rgba(140,175,225,0.3);background:transparent;margin-top:10px}

/* ending */
.endtype{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;padding:5px 14px;border-radius:20px;
  margin-bottom:18px;display:inline-block}
.et-reckon{background:rgba(224,86,79,0.14);color:#f0a9a4;border:0.5px solid rgba(224,86,79,0.4)}
.et-reposition{background:rgba(111,143,255,0.14);color:#aebcff;border:0.5px solid rgba(111,143,255,0.4)}
.et-expose{background:rgba(224,180,79,0.14);color:#f0d6a4;border:0.5px solid rgba(224,180,79,0.4)}
.et-hidden{background:rgba(160,120,255,0.16);color:#cdb6ff;border:0.5px solid rgba(160,120,255,0.5)}
.et-doubt{background:rgba(157,180,212,0.10);color:#9db4d4;border:0.5px solid rgba(157,180,212,0.35)}

/* MAYA meta layer */
.mayas{position:absolute;top:54px;left:18px;z-index:6;display:flex;gap:5px;opacity:0;transition:opacity .6s}
.mayas.show{opacity:1}
.mdot{width:7px;height:7px;border-radius:50%;border:0.5px solid var(--maya-cold);background:transparent}
.mdot.lit{background:var(--maya-cold);box-shadow:0 0 8px var(--maya-cold)}
.echo{position:absolute;top:50px;left:0;right:0;z-index:6;text-align:center;
  font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--maya-cold);
  opacity:0;transition:opacity .8s}
.echo.show{opacity:0.85}

.fade-black{position:absolute;inset:0;background:#04060c;z-index:9;opacity:0;pointer-events:none;transition:opacity .5s}
.fade-black.on{opacity:1}
</style>
</head>

<script>
/* ============================================================
   LAST CALL — deterministic playable engine
   Real frames · locked spine · replay-aware (MAYA layer)
   ============================================================ */

const F = 'frames/';
const stage = document.getElementById('stage');
let layerTop = document.getElementById('fA');
let layerBot = document.getElementById('fB');
let curImg = null;

/* ---------- persistent memory: the MAYA layer ---------- */
const MAYAS = ['control','doubt','connection','truth','love'];
function seen(){ try{return JSON.parse(localStorage.getItem('lc_mayas')||'[]')}catch(e){return[]} }
function remember(m){ const s=seen(); if(!s.includes(m)){s.push(m);localStorage.setItem('lc_mayas',JSON.stringify(s));} }
function plays(){ return +(localStorage.getItem('lc_plays')||0); }
function bumpPlays(){ localStorage.setItem('lc_plays', plays()+1); }

/* ---------- frame swap ---------- */
function show(img){
  if(img===curImg) return;
  curImg=img;
  const incoming = layerBot;
  incoming.style.backgroundImage = `url('${F}${img}')`;
  incoming.classList.remove('show'); void incoming.offsetWidth;
  incoming.classList.add('show');
  layerTop.classList.remove('show');
  const t=layerTop; layerTop=incoming; layerBot=t;
}

/* ---------- typewriter ---------- */
let typing=null;
function typeLine(el, txt, speed, done){
  clearInterval(typing); el.innerHTML='';
  if(!txt){ if(done)done(); return; }
  let i=0; const cur=document.createElement('span'); cur.className='cursor';
  el.appendChild(cur);
  typing=setInterval(()=>{
    if(i>=txt.length){clearInterval(typing); cur.remove(); if(done)done(); return;}
    cur.insertAdjacentText('beforebegin', txt[i]); i++;
  }, speed);
}

/* ---------- timer (choice pressure) ---------- */
let timer=null;
function runTimer(sec, onExpire){
  const fill=document.getElementById('timerfill');
  fill.style.transition='none'; fill.style.transform='scaleX(1)';
  void fill.offsetWidth;
  fill.style.transition=`transform ${sec}s linear`; fill.style.transform='scaleX(0)';
  clearTimeout(timer); timer=setTimeout(onExpire, sec*1000);
}
function stopTimer(){ clearTimeout(timer);
  const fill=document.getElementById('timerfill'); fill.style.transition='none';
}

/* the hidden path: Stay → Search Cloud (not Call Teo) → Expose unlocks The Truth */
/* the doubt path: froze at the gate (Stay), froze again at the final choice (timeout) → The Waiting */
let pathCodes=[];
let choiceWasTimeout=false;
function resolveEnd(toKey){
  if(toKey==='end_expose' && pathCodes[0]==='doubt' && pathCodes[1]==='truth'){ return 'end_hidden'; }
  if(toKey==='end_reposition' && pathCodes[0]==='doubt' && choiceWasTimeout){ return 'end_doubt'; }
  return toKey;
}

   RUNTIME

const plate=document.getElementById('plate');
const tap=document.getElementById('tap');

function setHUD(n){
  if(n.slug) document.getElementById('slug').textContent=n.slug;
  if(n.chapter) document.getElementById('chapter').textContent=n.chapter;
  document.getElementById('chapter').style.display = n.chapter? 'block':'none';
}

function go(key){
  stopTimer();
  node=STORY[key];
  if(!node){console.warn('missing node',key);return;}
  if(node.maya) remember(node.maya);
  if(node.end){ return showEnding(node); }

  show(node.img); setHUD(node);
  plate.style.display='block';
  document.getElementById('choices').innerHTML='';
  tap.style.display='none';
  renderMayas(false);

  // type the line, then action, then reveal interaction
  typeLine(document.getElementById('line'), node.line||'', 26, ()=>{
    typeLine(document.getElementById('action'), node.action||'', 12, ()=>{
      if(node.choices){ renderChoices(node); }
      else { armTap(node.next); }
    });
  });
}

function armTap(nextKey){
  tap.style.display='block';
  const handler=(e)=>{
    if(e.target.closest('.choice')||e.target.closest('.btn')) return;
    cleanup(); go(nextKey);
  };
  function cleanup(){ stage.removeEventListener('click',handler); }
  stage.addEventListener('click',handler);
}

function renderChoices(n){
  const box=document.getElementById('choices'); box.innerHTML='';
  box.style.pointerEvents='auto';   // reset (a prior timeout may have locked it)
  n.choices.forEach((c,idx)=>{
    const b=document.createElement('button'); b.className='choice';
    b.innerHTML=`<span class="ct">${c.ct}</span><span class="cx">${c.cx}</span>`;
    b.onclick=()=>{ if(c.maya)pathCodes.push(c.maya); stopTimer();
      choiceWasTimeout=false;
      go(resolveEnd(c.to)); };
    box.appendChild(b);
    setTimeout(()=>b.classList.add('in'), 120*idx+80);
  });
  if(n.timer){ runTimer(n.timer, ()=>{
      // timer runs out = the 5th outcome: the world decides for her — make it legible.
      // highlight whichever choice actually matches timeoutTo (falls back to 0 only if none match)
      box.style.pointerEvents='none';
      const btns=box.querySelectorAll('.choice');
      let idx=n.choices.findIndex(c=>c.to===n.timeoutTo);
      if(idx<0) idx=0;
      btns.forEach((b,i)=>{ b.classList.add(i===idx?'chosen':'dim'); });
      const echo=document.getElementById('echo');
      echo.textContent='she waited · the world decided';
      echo.classList.add('show');
      const fb=n.choices[idx]; if(fb.maya)pathCodes.push(fb.maya);
      choiceWasTimeout=true;
      setTimeout(()=>{ echo.classList.remove('show'); go(resolveEnd(n.timeoutTo)); }, 1800);
    });
  }
}

/* ---------- MAYA meta layer ---------- */
function renderMayas(force){
  const wrap=document.getElementById('mayas'); wrap.innerHTML='';
  const s=seen();
  MAYAS.forEach(m=>{
    const d=document.createElement('div'); d.className='mdot'+(s.includes(m)?' lit':'');
    wrap.appendChild(d);
  });
  wrap.classList.toggle('show', force || s.length>0);
}

/* ---------- ending ---------- */
function showEnding(n){
  remember(n.maya);
  show(n.img); setHUD({slug:n.label});
  plate.style.display='none'; tap.style.display='none';
  stopTimer();
  const fill=document.getElementById('timerfill'); fill.style.transform='scaleX(1)';
  setTimeout(()=>{
    document.getElementById('endtype').className='endtype et-'+(n.type==='reckon'?'reckon':n.type);
    document.getElementById('endtype').textContent=n.label;
    document.getElementById('endtitle').textContent=n.title;
    document.getElementById('endtext').textContent=n.text;
    const s=seen();
    document.getElementById('metaBtn').textContent = s.length>=5
      ? 'All five Mayas seen — ▷'
      : `Mayas you’ve become: ${s.length}/5 — find the rest`;
    document.getElementById('ending').classList.remove('hide');
    renderMayas(true);
  }, 1400);
  bumpPlays();
}

/* ---------- title / lifecycle ---------- */
function startGame(){
  pathCodes=[];
  document.getElementById('title').classList.add('hide');
  renderMayas(true);
  setTimeout(()=>go('open1'), 700);
}
function replay(){
  document.getElementById('ending').classList.add('hide');
  pathCodes=[];
  // returning-player echo: the world remembers
  const s=seen();
  const echo=document.getElementById('echo');
  if(s.length>0){
    echo.textContent = s.length>=5 ? 'every Maya remembers' : 'she has been here before';
    echo.classList.add('show'); setTimeout(()=>echo.classList.remove('show'),2600);
  }
  setTimeout(()=>{ document.getElementById('title').classList.remove('hide'); refreshReturnNote(); }, 400);
}
function refreshReturnNote(){
  const s=seen(), p=plays(); const note=document.getElementById('returnNote');
  if(p>0){ note.style.opacity='1';
    note.textContent = s.length>=5
      ? 'You have seen all five. Now watch someone else play.'
      : `Return ${p} · ${s.length}/5 Mayas · she is different this time`;
  }
}
refreshReturnNote(); renderMayas(true);
</script>
