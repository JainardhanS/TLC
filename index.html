<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<!-- CONFIDENTIAL · LAST CALL / MAYA — unreleased WIP. Do not share beyond the invited focus group. -->
<title>LAST CALL — an interactive drama</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --maya-cold:#9db4d4;
  --maya-ice:#e8f1fb;
  --accent:#6f8fff;
  --warn:#e0564f;
  --mono:'IBM Plex Mono',monospace;
  --serif:'Playfair Display',serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#04060c;overflow:hidden}
body{display:flex;align-items:center;justify-content:center;font-family:var(--mono)}

#stage{
  position:relative;
  width:min(100vw,calc(100vh * 9 / 16));
  height:min(100vh,calc(100vw * 16 / 9));
  background:#04060c;overflow:hidden;
  box-shadow:0 0 80px rgba(0,0,0,0.9);
}

/* ---- frame layers (crossfade + ken burns) ---- */
.frame{
  position:absolute;inset:0;
  background-size:cover;background-position:center 40%;   /* bias toward headroom */
  opacity:0;transition:opacity 1.1s ease;
  will-change:transform,opacity;
}
.frame.show{opacity:1;animation:kb 22s ease-out forwards}
@keyframes kb{               /* gentle centered push, no vertical drift — protects composition */
  from{transform:scale(1.0)}
  to{transform:scale(1.055)}
}
.vignette{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(120% 80% at 50% 35%,transparent 40%,rgba(2,4,10,0.55) 100%)}
.grade{position:absolute;inset:0;pointer-events:none;mix-blend-mode:soft-light;
  background:linear-gradient(180deg,rgba(60,110,180,0.20),rgba(10,20,40,0.10))}
/* guarantees HUD text stays legible no matter how bright the frame underneath is */
.hud-scrim{position:absolute;top:0;left:0;right:0;height:120px;z-index:5;pointer-events:none;
  background:linear-gradient(180deg,rgba(2,4,10,0.6) 0%,rgba(2,4,10,0) 100%)}

/* ---- top HUD ---- */
.hud{position:absolute;top:0;left:0;right:0;padding:16px 18px;z-index:6;
  display:flex;justify-content:space-between;align-items:flex-start;
  font-size:10px;letter-spacing:0.14em;color:rgba(228,238,251,0.88);text-transform:uppercase;
  text-shadow:0 1px 4px rgba(0,0,0,0.7),0 1px 10px rgba(0,0,0,0.4)}
.hud .slug{max-width:60%}
.hud .meta{text-align:right;line-height:1.6}
.timerbar{position:absolute;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.14);z-index:7}
.timerfill{height:100%;width:100%;background:linear-gradient(90deg,var(--accent),var(--warn));
  transform-origin:left;transition:transform 0.1s linear}
/* last third of the countdown: an unmissable pulsing glow, since the eye is on the choices, not the top edge */
.timerbar.urgent{animation:timerurgent 0.6s ease-in-out infinite}
@keyframes timerurgent{0%,100%{box-shadow:0 0 0 rgba(224,86,79,0)}50%{box-shadow:0 8px 18px -3px rgba(224,86,79,0.75)}}

/* ---- text plate ---- */
.plate{position:absolute;left:0;right:0;bottom:0;z-index:6;
  padding:26px 22px 26px;
  display:flex;flex-direction:column;
  background:linear-gradient(0deg,rgba(3,5,11,0.96) 0%,rgba(3,5,11,0.82) 55%,transparent 100%)}
.chapter{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--maya-cold);margin-bottom:12px;opacity:0.95}
.line{font-family:var(--serif);font-size:19px;line-height:1.6;color:var(--maya-ice);
  font-style:italic;margin-bottom:10px;min-height:1.6em}
.action{font-size:12.5px;line-height:1.65;color:rgba(210,226,248,0.9);margin-bottom:18px;
  font-family:var(--mono)}
.cursor{display:inline-block;width:7px;height:1.05em;vertical-align:-2px;
  background:var(--maya-ice);margin-left:2px;animation:blink 1s steps(1) infinite;opacity:0.8}
@keyframes blink{50%{opacity:0}}

/* ---- choices ---- */
.choices{display:flex;flex-direction:column;gap:9px}
.choice{appearance:none;border:0.5px solid rgba(140,175,225,0.32);
  background:rgba(20,32,54,0.5);backdrop-filter:blur(6px);
  border-radius:11px;padding:13px 15px;text-align:left;cursor:pointer;
  transition:border-color .18s,background .18s,transform .18s;opacity:0;transform:translateY(8px)}
.choice.in{opacity:1;transform:translateY(0)}
.choice:hover,.choice:focus{border-color:var(--accent);background:rgba(34,52,86,0.7);outline:none}
.choice .ct{display:block;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--maya-cold);margin-bottom:5px}
.choice .cx{display:block;font-size:13.5px;line-height:1.45;color:var(--maya-ice)}
.choice.dim{opacity:0.2;filter:saturate(0.5);transition:opacity .5s,filter .5s}
.choice.chosen{border-color:var(--warn);background:rgba(224,86,79,0.16);
  box-shadow:0 0 22px rgba(224,86,79,0.25);transition:.4s}

/* ---- tap-to-advance hint — a real button, in-flow so it always sits below the text ---- */
.tap{align-self:flex-end;margin-top:6px;font-size:11px;letter-spacing:0.1em;
  text-transform:uppercase;color:rgba(232,241,251,0.92);
  background:rgba(20,32,54,0.55);backdrop-filter:blur(6px);
  border:0.5px solid rgba(140,175,225,0.45);border-radius:20px;padding:9px 16px;
  animation:tappulse 1.8s ease-in-out infinite}
@keyframes tappulse{0%,100%{opacity:0.82}50%{opacity:1}}

/* ---- title / ending overlays ---- */
.curtain{position:absolute;inset:0;z-index:10;background:#04060c;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;transition:opacity 1s ease}
.curtain.hide{opacity:0;pointer-events:none}
/* ending keeps the final frame in view, scrimmed — the climax stays cinematic, not a slide */
#ending{background:linear-gradient(180deg,rgba(4,6,12,0.5) 0%,rgba(4,6,12,0.72) 45%,rgba(4,6,12,0.96) 100%)}
.curtain .mark{font-size:11px;letter-spacing:0.4em;color:var(--maya-cold);text-transform:uppercase;margin-bottom:18px}
.curtain h1{font-family:var(--serif);font-size:46px;font-weight:600;color:var(--maya-ice);
  letter-spacing:0.02em;line-height:1;margin-bottom:16px}
.curtain .tag{font-family:var(--serif);font-style:italic;font-size:15px;color:rgba(205,222,245,0.7);
  max-width:80%;line-height:1.6;margin-bottom:34px}
.btn{appearance:none;border:0.5px solid var(--accent);background:rgba(111,143,255,0.12);
  color:var(--maya-ice);font-family:var(--mono);font-size:12px;letter-spacing:0.1em;
  text-transform:uppercase;padding:13px 26px;border-radius:30px;cursor:pointer;transition:.18s}
.btn:hover{background:var(--accent);color:#04060c}
.btn.ghost{border-color:rgba(140,175,225,0.3);background:transparent;margin-top:10px}

/* ending */
.endtype{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;padding:5px 14px;border-radius:20px;
  margin-bottom:18px;display:inline-block}
.et-reckon{background:rgba(224,86,79,0.14);color:#f0a9a4;border:0.5px solid rgba(224,86,79,0.4)}
.et-reposition{background:rgba(111,143,255,0.14);color:#aebcff;border:0.5px solid rgba(111,143,255,0.4)}
.et-expose{background:rgba(224,180,79,0.14);color:#f0d6a4;border:0.5px solid rgba(224,180,79,0.4)}
.et-hidden{background:rgba(160,120,255,0.16);color:#cdb6ff;border:0.5px solid rgba(160,120,255,0.5)}
.et-doubt{background:rgba(157,180,212,0.10);color:#9db4d4;border:0.5px solid rgba(157,180,212,0.35)}

/* MAYA meta layer */
.mayas{position:absolute;top:54px;left:18px;z-index:6;display:flex;gap:5px;opacity:0;transition:opacity .6s}
.mayas.show{opacity:1}
.mdot{width:7px;height:7px;border-radius:50%;border:0.5px solid var(--maya-cold);background:transparent}
.mdot.lit{background:var(--maya-cold);box-shadow:0 0 8px var(--maya-cold)}
.echo{position:absolute;top:50px;left:0;right:0;z-index:6;text-align:center;
  font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--maya-cold);
  opacity:0;transition:opacity .8s}
.echo.show{opacity:0.85}

.fade-black{position:absolute;inset:0;background:#04060c;z-index:9;opacity:0;pointer-events:none;transition:opacity .5s}
.fade-black.on{opacity:1}
/* darkens the CURRENT frame instead of cutting to a blank one — reads as a fade, not a broken load */
.blackout{position:absolute;inset:0;z-index:5;background:#04060c;opacity:0;pointer-events:none;transition:opacity 1.6s ease}
.blackout.on{opacity:0.9}
</style>
</head>
<body>
<div id="stage">
  <div class="frame" id="fA"></div>
  <div class="frame" id="fB"></div>
  <div class="vignette"></div>
  <div class="grade"></div>
  <div class="hud-scrim"></div>
  <div class="blackout" id="blackout"></div>
  <div class="fade-black" id="fadeblk"></div>

  <div class="timerbar"><div class="timerfill" id="timerfill"></div></div>
  <div class="hud">
    <div class="slug" id="slug">INT. JFK T4 · GATE B22 · 11:47 PM</div>
    <div class="meta" id="meta" style="opacity:0.35">build 019</div>
  </div>
  <div class="mayas" id="mayas"></div>
  <div class="echo" id="echo"></div>

  <div class="plate" id="plate" style="display:none">
    <div class="chapter" id="chapter"></div>
    <div class="line" id="line"></div>
    <div class="action" id="action"></div>
    <div class="choices" id="choices"></div>
    <div class="tap" id="tap" style="display:none">continue ›</div>
  </div>

  <!-- TITLE -->
  <div class="curtain" id="title">
    <div class="mark">M A Y A &nbsp;·&nbsp; title 01</div>
    <h1>LAST&nbsp;CALL</h1>
    <div class="tag">A choice. A consequence. A life that isn’t yours anymore.</div>
    <button class="btn" onclick="startGame()">Begin</button>
    <button class="btn ghost" onclick="skipToChoice()" style="margin-top:14px;opacity:0.6">TEMP — Skip to choice</button>
    <div id="returnNote" style="margin-top:22px;font-size:10px;letter-spacing:0.12em;color:var(--maya-cold);text-transform:uppercase;opacity:0"></div>
  </div>

  <!-- ENDING -->
  <div class="curtain hide" id="ending">
    <div class="endtype" id="endtype"></div>
    <h1 style="font-size:34px" id="endtitle"></h1>
    <div class="tag" id="endtext"></div>
    <button class="btn" onclick="replay()">Play again</button>
    <button class="btn ghost" id="metaBtn" onclick="replay()"></button>
  </div>
</div>

<script>
/* ============================================================
   LAST CALL — deterministic playable engine
   Real frames · locked spine · replay-aware (MAYA layer)
   ============================================================ */

const F = 'frames/';
/* TESTING PHASE: timers off — isolating story pull / stickiness from the time-pressure mechanic.
   Flip to true to restore the countdown + "the world decides" 5th-outcome behavior. */
const TIMERS_ENABLED = false;
const stage = document.getElementById('stage');
let layerTop = document.getElementById('fA');
let layerBot = document.getElementById('fB');
let curImg = null;

/* ---------- persistent memory: the MAYA layer ---------- */
const MAYAS = ['control','doubt','connection','truth','love'];
function seen(){ try{return JSON.parse(localStorage.getItem('lc_mayas')||'[]')}catch(e){return[]} }
function remember(m){ const s=seen(); if(!s.includes(m)){s.push(m);localStorage.setItem('lc_mayas',JSON.stringify(s));} }
function plays(){ return +(localStorage.getItem('lc_plays')||0); }
function bumpPlays(){ localStorage.setItem('lc_plays', plays()+1); }

/* ---------- frame swap ---------- */
function show(img){
  if(img===curImg) return;
  curImg=img;
  const incoming = layerBot;
  incoming.style.backgroundImage = `url('${F}${img}')`;
  incoming.classList.remove('show'); void incoming.offsetWidth;
  incoming.classList.add('show');
  layerTop.classList.remove('show');
  const t=layerTop; layerTop=incoming; layerBot=t;
}

/* ---------- typewriter ---------- */
let typing=null;
function typeLine(el, txt, speed, done){
  clearInterval(typing); el.innerHTML='';
  if(!txt){ if(done)done(); return; }
  let i=0; const cur=document.createElement('span'); cur.className='cursor';
  el.appendChild(cur);
  typing=setInterval(()=>{
    if(i>=txt.length){clearInterval(typing); cur.remove(); if(done)done(); return;}
    cur.insertAdjacentText('beforebegin', txt[i]); i++;
  }, speed);
}

/* ---------- timer (choice pressure) ---------- */
let timer=null, urgentTimer=null;
function runTimer(sec, onExpire){
  const fill=document.getElementById('timerfill');
  const bar=document.querySelector('.timerbar');
  fill.style.transition='none'; fill.style.transform='scaleX(1)';
  void fill.offsetWidth;
  fill.style.transition=`transform ${sec}s linear`; fill.style.transform='scaleX(0)';
  bar.classList.remove('urgent');
  clearTimeout(timer); clearTimeout(urgentTimer);
  timer=setTimeout(onExpire, sec*1000);
  urgentTimer=setTimeout(()=>bar.classList.add('urgent'), sec*1000*0.65);
}
function stopTimer(){ clearTimeout(timer); clearTimeout(urgentTimer);
  const fill=document.getElementById('timerfill'); fill.style.transition='none';
  const bar=document.querySelector('.timerbar'); if(bar) bar.classList.remove('urgent');
}

/* ============================================================
   STORY GRAPH — nodes. type: 'beat' (tap) or 'choice' or 'end'
   img = frame · line = Maya voice (serif) · action = stage dir
   ============================================================ */
const STORY = {

  /* ---------------- THE NEGOTIATION (new cold open · only Maya · raises stakes, establishes her) ---------------- */
  neg1:{ img:'neg1_rooftop.png', slug:'EXT. ROOFTOP · TWENTY STORIES UP',
    line:'', action:'A rooftop, twenty stories up. Wind with teeth in it. Down on the street, sirens that started an hour ago and haven’t once stopped.',
    next:'neg2' },
  neg2:{ img:'neg2_listening.png', slug:'EXT. ROOFTOP · FIFTY MINUTES IN',
    line:'Fifty minutes on this call. Her voice has never once left the register you’d use to say good morning.',
    action:'', next:'neg3' },
  neg3:{ img:'neg2_listening.png', slug:'EXT. ROOFTOP · FIFTY MINUTES IN',
    line:'“I won’t lie to you. I don’t know if it gets better. I know you’re still here. Right now that’s the only fact I need.”',
    action:'On the line: a voice, young, coming apart. She doesn’t flinch. Her thumb strokes once across the inside of her wrist — a habit that was never hers. She stopped feeling herself do it months ago.',
    next:'neg4' },
  neg4:{ img:'neg4_after.png', slug:'EXT. ROOFTOP · AFTER',
    line:'It ends. One long breath, and nothing else. Celebrating is a thing she trained out of herself.',
    action:'Below, they walk a kid back from the edge, an arm on each shoulder. She will never learn the name. She never asks. Names make it personal. Personal is how you lose. She learned that the week they buried him. Closed casket, and the paperwork closed faster than the dental records ever came back.',
    next:'open1' },

  /* ---------------- OPENING (wound before hook · ~25s muted) ---------------- */
  // op1 — TRANSITION (from professional competence to personal blank page)
  open1:{ img:'00_hero.png', slug:'INT. JFK T4 · GATE B22 · 11:47 PM',
    line:'Nineteen years of knowing the exact next word. Tonight her mouth is empty.',
    action:'London. The request came through channels she thought she’d sealed off — and it asked for her by name. She could have said no. She has never once said no.', next:'open2' },

  // op2 — ISOLATION (the world swallows her)
  open2:{ img:'maya_wide.png', slug:'INT. JFK T4 · THE LAST FLIGHT',
    line:'The terminal streams around her — rolling bags, final calls, everyone pulled toward somewhere. She hasn’t moved in eleven minutes.',
    action:'', next:'pt02' },

  // his phone, not hers — an archive, not a line. detonates in open5 precisely because it has no signal.
  pt02:{ img:'phone_archive.png', slug:'HER COAT POCKET · SIX MONTHS OF IT',
    line:'', action:'A phone. Not hers. His — riding in her coat for six months. No missed calls. He can’t call. Only what he left behind: one voicemail, forty-one seconds, never played. A photo folder she can’t bring herself to delete. Her number, still saved as “Home.” Her hand turns it face-down. Walks away.',
    next:'open3' },

  // op3 — THE WOUND (the object, not the count — carried, inert, sacred)
  open3:{ img:'phone_archive.png', slug:'HER COAT POCKET · SIX MONTHS OF IT',
    line:'Every day for six months. No signal, no service. It doesn’t need one.',
    action:'She knows its weight the way she knows her own pulse — through the coat, without looking. Tonight, for the first time, she leaves it face-up.',
    next:'open4' },

  // op4 — THE CRACK (the eyes carry what the face won't; ring detail — kept per direction, no visible-jewelry conflict since this beat is an eyes ECU)
  open4:{ img:'maya_eyes.png', slug:'INT. GATE B22 · 11:48 PM',
    line:'Six months a widow. She still wears the ring. She has trained herself to stop turning it when anyone is watching.',
    action:'', next:'open5' },

  // op5 — THE HOOK (now it lands — the call she cannot ignore)
  open5:{ img:'01_dontgeton.png', slug:'A MESSAGE · FROM A DEAD MAN',
    line:'His number was disconnected the week of the funeral. She made that call herself.',
    action:'It lights up. No signal. Six months dark. And it has something to say. One name: DANIEL. Three words: “Don’t get on.”',
    next:'c1' },

  /* ---------------- CHOICE 1 — THE GATE ---------------- */
  c1:{ img:'03_gate_choice.png', slug:'INT. GATE B22 · 4:00 TO DEPARTURE', chapter:'Choice — who is Maya right now?',
    line:'From her seat she can still see the jet bridge door. Open. The queue is down to a handful — shorter than her list of reasons to stay in this chair.',
    action:'',
    timer:18, timeoutTo:'reveal_board',
    choices:[
      {ct:'Board', cx:'London is waiting. She told you herself: she never says no.', to:'reveal_board', maya:'control'},
      {ct:'Stay',  cx:'Something is wrong. You don’t fly into wrong.', to:'reveal_stay', maya:'doubt'},
      {ct:'Call back', cx:'Six months of not answering him. Answer him now.', to:'reveal_call', maya:'connection'},
    ]},

  /* ---------------- IDENTITY REVEAL (choice lands before interiority explains it — she tells you who she is, not the other way round) ---------------- */
  reveal_board:{ img:'03_gate_choice.png', dim:true, slug:'INT. GATE B22 · A DECISION MADE',
    line:'Control.', action:'Nineteen years of choosing her words — and she didn’t mean to say that one.', next:'board_1' },
  reveal_stay:{ img:'03_gate_choice.png', dim:true, slug:'INT. GATE B22 · A DECISION MADE',
    line:'Doubt.', action:'Nineteen years of choosing her words — and she didn’t mean to say that one.', next:'stay_1' },
  reveal_call:{ img:'03_gate_choice.png', dim:true, slug:'INT. GATE B22 · A DECISION MADE',
    line:'Connection.', action:'Nineteen years of choosing her words — and she didn’t mean to say that one.', next:'call_1' },

  /* ================= BRANCH A — BOARD (Control) — the London payoff: Cranmer House, Flat 74.
     Requested by name = the hostage-taker named her. Sealed channels = the sealed inquiry office. ================= */
  board_1:{ img:'board_jetbridge.png', slug:'INT. JET BRIDGE · 11:51 PM', chapter:'Board · the crossing',
    line:'“Don’t get on.” She got on. Nineteen years of walking toward the thing everyone else is running from — she wasn’t going to break the streak for a text message.',
    action:'The cabin door thunks shut behind her. In her coat, his phone is dark again. It said its piece.', next:'board_2'},
  board_2:{ img:'board_seated.png', slug:'INT. CABIN · 14A · WHEELS UP',
    line:'Tasking order, four lines, read eleven times before wheels-up: Cranmer House. Flat 74. Subject requests Reyes, by name.',
    action:'Nineteen years, and exactly one address has ever asked for her by name before boarding. She signed for this assignment inside the hour — flying back to stand in a doorway she left eleven years ago, and she said yes anyway.', next:'board_3'},
  board_3:{ img:'board_face.png', slug:'INT. CABIN · OVER THE ATLANTIC · 3:12 AM',
    line:'Six hours to think about a door she’s thought about every day for eleven years. She spends every one of them not doing that.',
    action:'Ops updates come twice an hour, clipped and procedural — petrol confirmed, two occupants beyond the subject, deadline nine a.m. Nothing about Callum she didn’t already carry onto this plane. Composure is a discipline, not a feeling; she keeps hers exactly as trained, until Heathrow’s lights rise under the wing and her thumb finds the ring without asking permission first.', next:'board_4'},
  board_4:{ img:'bd_descent.png', slug:'INT. CABIN · DESCENT INTO HEATHROW · DAWN',
    line:'London surfaces grey through the cloud — a city that files its disasters and reissues the flats.',
    action:'Wheels down at 6:40. A liaison officer says her name at the jet bridge like a fact he was sent to verify. Blue light the whole M4 in, and neither of them wastes it on talk.', next:'board_5'},
  board_5:{ img:'bd_cordon.png', slug:'EXT. CRANMER HOUSE · 7:26 AM',
    line:'Eleven years and the tower hasn’t moved. She touches the ring once and gets out of the car.',
    action:'Superintendent Hale briefs in bullet points: petrol on every soft surface, a lighter, no demands but her, deadline nine a.m. Breach is off the table — one spark does his job for him. Talking is the only tool anyone has.', next:'c_board_1'},

  c_board_1:{ img:'bd_cordon.png', slug:'EXT. CRANMER HOUSE · COMMAND LINE', chapter:'Choice — where does her voice live?',
    line:'Hale wants her in the truck — coached, recorded, deniable. Callum’s one demand is her voice at the door, nothing between them but the wood that lied last time.',
    action:'',
    timer:16, timeoutTo:'bd_truck_1',
    choices:[
      {ct:'The Truck', cx:'Run it by the book. Distance is discipline — it’s what they flew her here for.', to:'bd_truck_1', maya:'control'},
      {ct:'The Door', cx:'Stand where she stood. Give him the only thing he actually asked for.', to:'bd_door_1', maya:'connection'},
    ]},

  /* — truck path: control tries first, and he takes it apart — */
  bd_truck_1:{ img:'bd_truck.png', slug:'INT. COMMAND TRUCK · FIRST CONTACT',
    line:'Headset. Cue cards. Her voice does what it has done for nineteen years — it lowers the temperature of a room she isn’t in.',
    action:'“Callum. My name is Maya. I came, like you asked.” Four seconds of breathing on the line. Then: “No you didn’t. I can hear the truck in your voice.”', next:'bd_truck_2'},
  bd_truck_2:{ img:'bd_truck.png', slug:'INT. COMMAND TRUCK · MADE',
    line:'“‘My name is.’ That’s the opener you used on her. I was twelve, Maya. I memorised you.”',
    action:'Down the line, a snick — the lighter cap. Then flint, struck once, close to the phone, so she can hear exactly how thin the morning is. “The door. Ten minutes. Or I stop asking.”', next:'bd_truck_3'},
  bd_truck_3:{ img:'bd_cordon.png', slug:'EXT. THE CORDON · WALKING',
    line:'Nineteen years of technique, spent in one sentence — because he heard it the first time, standing in his mother’s blood.',
    action:'She is out of the truck before Hale finishes forbidding it. Control was never going to climb four floors.', next:'bd_door_2'},

  /* — door path: she goes straight to where she stood — */
  bd_door_1:{ img:'bd_stairwell.png', slug:'INT. CRANMER HOUSE · STAIRWELL',
    line:'Hale calls it against protocol. She agrees with him and keeps climbing.',
    action:'Four flights of bleach and rain. The cordon noise drops away floor by floor, until the loudest thing in the building is what she’s about to say.', next:'bd_door_2'},

  /* — convergence: the door — */
  bd_door_2:{ img:'bd_door74.png', slug:'FLAT 74 · THE DOOR',
    line:'Same door. Council green over council green. The landing smells of petrol, sweet and patient.',
    action:'“Callum. It’s Maya. No headset, no truck — just me.” Inside, a child coughs against the fumes. Below, boots reposition on concrete and wait to be wrong.', next:'bd_door_3'},
  bd_door_3:{ img:'bd_door74.png', slug:'FLAT 74 · HIS TERMS',
    line:'“I don’t want them,” he says through the wood — and she believes him. Men who want their hostages never let you hear them cough.',
    action:'A phone taps the door from the inside. “It’s live, Maya. Say what your sealed file says. What they did. What you let them do. Or at nine o’clock this flat finishes the job.”', next:'bd_door_4'},
  bd_door_4:{ img:'bd_door74.png', slug:'FLAT 74 · TWO NEGOTIATIONS',
    line:'In her ear, the radio: legal says the gag order holds, give him nothing, buy time. Through the door, a boy who can smell time being bought.',
    action:'She is negotiating in both directions now — a breach team that thinks he’s bluffing, and a boy who has spent eleven years proving he isn’t. The child coughs again. Smaller.', next:'bd_door_5'},
  bd_door_5:{ img:'bd_door74.png', slug:'FLAT 74 · THE READ',
    line:'She listens the way other people aim. The lighter is in his left hand, low — she can hear it in how his sentences lean.',
    action:'He hasn’t decided. Deciders don’t livestream; they don’t ask for witnesses. What he wants isn’t fire — it’s one person with something to lose telling the truth on the record. She has exactly one of those to offer.', next:'c_board_final'},

  c_board_final:{ img:'bd_door74.png', slug:'FLAT 74 · 8:57 AM', chapter:'The last choice',
    line:'Three minutes. One door, two children breathing behind it — the one who is seven, and the one who has been twelve for eleven years.',
    action:'',
    timer:20, timeoutTo:'board_end_script',
    choices:[
      {ct:'Say Her Name', cx:'Break the seal on his live channel — the name, the promise, her part in it. Whatever it costs after.', to:'board_end_name', maya:'truth'},
      {ct:'Run the Script', cx:'Hold the gag. Nineteen years says she can land him without bleeding for it.', to:'board_end_script', maya:'control'},
      {ct:'Open the Door', cx:'Trade up. Amara and her boy walk out; Maya sits where the witness should have been.', to:'board_end_room', maya:'connection'},
    ]},

  board_end_name:{ end:true, type:'expose', label:'Ending — Say Her Name', img:'bd_end_name.png',
    title:'Say Her Name', maya:'truth',
    text:'“Her name was Mairead Doyle. She was holding a phone, not a weapon. I promised no one would come through the door, and they came through the door, and I signed the paper that kept my objection quiet. That’s the file. That’s all of it.” Said once, plainly, onto a live stream with her career inside it. The lock turns. Amara and her son come out low and running; Callum comes out last, hands open, and the lighter he surrenders is still warm from his grip. The gag is void, the inquest reopened with her name at the top — she did that math at the door and said it anyway. Nineteen years of believing names make it personal, and personal is how you lose. Wrong. Personal is the only way anyone comes home. On the flight back she writes them down: Mairead. Callum. Amara. Sami, who is seven. A phone once told her not to get on. She’d board again.'},

  board_end_script:{ end:true, type:'reckon', label:'Ending — Textbook', img:'bd_end_window.png',
    title:'Textbook', maya:'control',
    text:'She runs it clean — the hooks, the minimal encouragers, the surrender frame, nineteen years compressed into eleven flawless minutes. It works the way technique works: at 8:59 the door opens and Amara and her son come out low and running, because he never wanted them, and her script gave him a way to say so. What it doesn’t give him is a reason to follow. He goes to the window instead, lighter raised into the new sun, and a marksman two rooftops away does what marksmen are for. The report will say the object in his hand could not be identified in time. Eleven years ago a different report said the same sentence about a phone. Everyone she was flown here to save is alive. The boy who only ever asked for a witness is not. She kept the rule — never make it personal — and finally understands what the rule was for: making sure she was never in the room.'},

  board_end_room:{ end:true, type:'reposition', label:'Ending — The Room', img:'bd_end_room.png',
    title:'The Room', maya:'connection',
    text:'“Send them out, Callum. Keep me. You wanted someone with something to lose — I’m carrying more of that than anyone on this street.” The cardinal sin of her profession, offered in the flat voice she trusts most. The door opens six inches; Amara and her boy pour through it, and Maya steps into the room her promise died in. Petrol, dawn light, a wall she doesn’t look at. She sits on the floor and does the hardest technique she knows — nothing. No script, no frame, just a witness who stays. He talks for fifty minutes: the sofa, the silhouette, the sound command boots make on a landing. At 9:51 he caps the lighter and hands it over like something he’s been carrying for someone else. They walk out together into the blue lights. Her career ends in that doorway, and so does the rule about never making it personal. She landed believing distance was the skill. The skill was crossing the door.'},

  /* ================= BRANCH B — STAY (Doubt) — the interception: Nadia's exit was timed
     for Maya to be over the Atlantic. She stayed. 100 minutes exist that never should have. ================= */
  stay_1:{ img:'stay_gate.png', slug:'INT. GATE B22 · 11:52 PM', chapter:'Stay · the interception',
    line:'Ninety-one seconds since she stepped out of the line. Ninety-two. She counts instead of shaking — a married habit; she no longer remembers which of them started it.',
    action:'The gate drains out around her — roller bags, sneakers, one boarding pass held overhead like a verdict. Then rows of empty seats, and Maya, the only person in the terminal with nowhere she is supposed to be.', next:'stay_2'},
  stay_2:{ img:'st_departed.png', slug:'INT. T4 · DEPARTURES BOARD · 12:01 AM',
    line:'Overhead the board flips: LONDON — DEPARTED. Gentle as a nurse pulling up a sheet.',
    action:'No assignment now, no given story, no version of tonight where she was somewhere else. She opens Teo’s thread — six months of his unanswered check-ins — and spends five words: “Was it an accident. Yes or no.” Send, before nineteen years of training can confiscate it.', next:'stay_3'},
  stay_3:{ img:'st_missed.png', slug:'HER OWN PHONE · MARCH',
    line:'Waiting for Teo, her thumb goes digging where she forbade it — March. The bad month.',
    action:'UNKNOWN — fourteen calls in nine days. No voicemails. She never answered one; grief has a spam folder. She counted them once, at four in the morning, then made herself stop counting. Fourteen. Tonight the number won’t lie flat.', next:'stay_4'},
  stay_4:{ img:'stay_nadia_call.png', slug:'INT. GATE B22 · 12:04 AM · NADIA CALLING',
    line:'The screen interrupts: NADIA KOROLOVA. A name Daniel said like a colleague and saved like a friend.',
    action:'She answers with silence — old habit. Nadia doesn’t ask who’s there. “You didn’t board.” Not a question. And under her voice, half a beat late, the same PA announcement still hanging in the air over Maya’s head. Same ceiling. Same building.', next:'c2_stay'},

  c2_stay:{ img:'stay_nadia_call.png', slug:'INT. GATE B22 · 12:05 AM', chapter:'Choice — the first move',
    line:'Nadia Korolova is under this roof and doesn’t know she just told her. In Maya’s trade that’s called the only advantage anyone gives you for free.',
    action:'',
    timer:16, timeoutTo:'st_hunt_1',
    choices:[
      {ct:'Hunt', cx:'Hang up soft. Find her before she decides what her face should be doing.', to:'st_hunt_1', maya:'doubt'},
      {ct:'Name It', cx:'“You’re in the terminal.” Spend the advantage and see what honesty buys.', to:'st_name_1', maya:'connection'},
    ]},

  /* — hunt path: the negotiator as tracker — */
  st_hunt_1:{ img:'st_concourse.png', slug:'INT. CONCOURSE B · HUNTING',
    line:'“I’ll call you back.” She won’t. She’s already walking.',
    action:'She reads the building like a statement: this hour, international pier, seated far from people and near the boards. Four minutes of concourse at cordon-pace, and there — a shuttered wine bar, one silhouette in the dark of it, two suitcases packed for a life, not a trip.', next:'st_hunt_2'},
  st_hunt_2:{ img:'st_winebar.png', slug:'THE WINE BAR · SIXTY SECONDS OF BASELINE',
    line:'Rule one, before a single word: own the baseline.',
    action:'Sixty seconds in shadow. Nadia isn’t crying and isn’t rehearsing. She’s watching the departures board — not her own flight. The London line. The one Maya isn’t on. Then, without turning: “You walk like him when you’re deciding something. Sit down, Maya.”', next:'st_meet_1'},

  /* — name-it path: the advantage, spent on purpose — */
  st_name_1:{ img:'stay_nadia_call.png', slug:'INT. GATE B22 · THE ADVANTAGE, SPENT',
    line:'“You’re in the terminal.” Four words, and she hears Nadia stop breathing — then start again, slower, like a decision being made.',
    action:'“Concourse B. The wine bar that’s closed.” A pause with weight in it. “I could have lied just now,” Nadia says. “So could I,” says Maya. In both their trades, that is how you say thank you.', next:'st_name_2'},
  st_name_2:{ img:'st_winebar.png', slug:'THE WINE BAR · 12:14 AM',
    line:'Two suitcases packed for a life, not a trip. A boarding pass creased like a decision made months ago.',
    action:'Nadia stands to meet her — no embrace, no distance, the exact professional middle. Up close, the last six months have happened to her too. “You came straight here,” she says. “No angles. He always said you’d be the last honest one in any room.”', next:'st_meet_1'},

  /* — convergence: the two-hander — */
  st_meet_1:{ img:'st_nadia_face.png', slug:'THE WINE BAR · HER TERMS',
    line:'“The 1:55 to São Paulo, one way. When they call my row I stand up, and you let me. Until then — ask me anything.”',
    action:'A deadline. Nineteen years on hostage lines and the deadline was always the other side’s move — she knows exactly what deadlines are for: making people trade like they’re drowning. A hundred minutes on the board. She sits down slowly, like the room is wired, and does not trade like she’s drowning.', next:'st_meet_2'},
  st_meet_2:{ img:'st_nadia_face.png', slug:'THE WINE BAR · THE READ',
    line:'“Why São Paulo?” — “Because Daniel hates a city he can’t walk.” Present tense. Uncorrected. Grief’s oldest tell — or the oldest trick in the book.',
    action:'She opens a silence, the working kind, the one strangers fall into. Nadia watches it stretch and smiles like a bruise: “You went quiet so I’d fill it. He told me you do that.” Six months she has been the widow. She hadn’t priced in being the wife somebody else was taught.', next:'st_meet_3'},
  st_meet_3:{ img:'st_nadia_face.png', slug:'THE WINE BAR · WHAT SHE VOLUNTEERS',
    line:'“He was frightened the last year, and not of me — you’ll have to decide that part yourself. I’m leaving because I’d rather be paranoid in another hemisphere than right in this one.”',
    action:'Every sentence lands on the same knife-edge: exactly what a terrified friend would say, exactly what a careful liar would choose. Her hands are still. Too still. Overhead: “Flight 803 to São Paulo, now boarding Group One.” Nadia rises. “Two minutes. Don’t follow me to the ladies’ — it’s beneath us both.”', next:'st_teo_1'},

  /* — Teo, live-fire: the blade arrives mid-negotiation — */
  st_teo_1:{ img:'teo_incoming.png', slug:'INT. CONCOURSE B · 1:12 AM · TEO CALLING',
    line:'Her phone, the moment Nadia is out of sight: TEO VARGAS. Five words sent at midnight, and he has spent the whole hour finding his nerve.',
    action:'“Not over the phone,” he starts — and then does it over the phone, because six months is heavier than procedure. “He came to me, Maya. Three weeks before. Route 9W, the overpass — he named the spot. It’s in no report, because I never wrote one.”', next:'st_teo_2'},
  st_teo_2:{ img:'teo_silhouette.png', slug:'PHONE · THE TAPE LINE',
    line:'“There’s worse. Someone stood at the tape line before any of us called it in. Back to the wreck, not looking. Maya — it was a woman.”',
    action:'Forty meters out, Nadia is walking back, coat over one arm, face already arranged. Maya does the arithmetic she hates herself for: height, build, the particular stillness of someone who cannot look at the thing they came to see.', next:'c3_stay'},

  c3_stay:{ img:'st_winebar.png', slug:'THE WINE BAR · 1:15 AM', chapter:'Choice — the blade',
    line:'A woman at the tape line, hours before the world knew — in her pocket now, and Nadia doesn’t know she’s carrying it. Twenty-five minutes to the gate.',
    action:'',
    timer:16, timeoutTo:'st_hold_1',
    choices:[
      {ct:'Hold It', cx:'Sheathed. A cornered read is a ruined read — keep the room open, let her keep volunteering.', to:'st_hold_1', maya:'doubt'},
      {ct:'Play It', cx:'Lay the woman at the tape line on the table, and read the half-second after.', to:'st_play_1', maya:'truth'},
    ]},

  /* — play it: the accusation — */
  st_play_1:{ img:'st_nadia_face.png', slug:'THE WINE BAR · THE ACCUSATION',
    line:'“The night he died, someone stood at the tape line before it was called in. A woman. Back to the wreck.” Flat, no verb pointed at anyone. Then she reads the half-second.',
    action:'The half-second holds no flinch where liars flinch, no outrage where the innocent keep theirs. It holds something worse: relief. “So somebody finally says it out loud,” Nadia breathes. “It was me.”', next:'st_play_2'},
  st_play_2:{ img:'st_nadia_face.png', slug:'THE WINE BAR · THE TRUE ONE',
    line:'“Eleven days I’d been following him, because he was frightened and wouldn’t say why. You want my reason — I only have the true one: I was afraid for him. Notice it’s also exactly what I’d say if I were what you’re afraid I am.”',
    action:'Nineteen years of reads, and this one returns clean and unreadable — not a wall; a window with two views. She spends her last card anyway: “London. Did you ask for me by name?” — “No.” It lands the same way. True-shaped. Both directions.', next:'st_final_1'},

  /* — hold it: the other craft — */
  st_hold_1:{ img:'st_nadia_face.png', slug:'THE WINE BAR · THE SHEATHED BLADE',
    line:'She folds the tape line away unplayed and asks about the weather in São Paulo. Interrogation is pressure. This is the other craft: gravity.',
    action:'She offers small true things — his unforgivable parking, how he read a menu twice and ordered the first thing anyway. Nadia laughs once, real, then stops like the laugh cost money. “Before they call my row — better you hear it from me than from whoever’s been calling you all night.”', next:'st_hold_2'},
  st_hold_2:{ img:'st_nadia_face.png', slug:'THE WINE BAR · GIVEN, NOT TAKEN',
    line:'“I was on Route 9W that night. At the tape, before the sirens. Eleven days I’d been following him, because he was frightened and wouldn’t say why. That’s the whole confession, and I know exactly how it sounds.”',
    action:'Given, not taken — worth everything, provable never. The read returns the way the deep ones do when it matters most: true-shaped in both directions. “London,” Maya says. “Did you ask for me by name?” — “No.” Same shape. Both views.', next:'st_final_1'},

  /* — convergence: final call — */
  st_final_1:{ img:'st_lastcall.png', slug:'GATE B31 · 1:38 AM · FINAL CALL',
    line:'“Final call, Flight 803 to São Paulo.” Nadia stands and shoulders her bag like a verdict no one read out.',
    action:'Twenty-five hundred hours of hostage tape taught her the instrument doesn’t lie. Tonight the instrument says both. Frightened women flee the country; guilty women flee the country; the same flight carries either one. On the board, amber: GATE CLOSING.', next:'c_stay_final'},

  c_stay_final:{ img:'st_lastcall.png', slug:'GATE B31 · 1:39 AM', chapter:'The last choice',
    line:'Nine steps of jet bridge between her and the only living person fluent in Daniel. The read still says both. It will always say both.',
    action:'',
    timer:20, timeoutTo:'end_stay_verdict',
    choices:[
      {ct:'Let Her Board', cx:'The read is done. Some questions are load-bearing — carry this one whole.', to:'end_stay_verdict', maya:'doubt'},
      {ct:'Build the Bridge', cx:'No corner, one offer: miss the flight, stay findable. Nothing else asked tonight.', to:'end_stay_bridge', maya:'connection'},
      {ct:'On the Record', cx:'Let her fly — then put your name on everything you can’t prove, where it can’t be buried.', to:'end_stay_record', maya:'truth'},
    ]},

  end_stay_verdict:{ end:true, type:'doubt', label:'Ending — The Open Verdict', img:'st_end_verdict.png',
    title:'The Open Verdict', maya:'doubt',
    text:'“Safe flight.” Two words, none of the nineteen-year closers, and she means both of them. At the mouth of the jet bridge Nadia turns — a look that could be apology, gratitude, or the last frame of a getaway — and Maya lets it be all three at once, the hardest technique she has ever run. The door seals. Here is what she boarded a thousand crises believing: that doubt is the hostage, and certainty is how you bring it home. Wrong. Some questions are load-bearing. Pull them out and the roof comes down on everyone still inside — Teo, Nadia, the man she married, her. She walks back through the empty terminal past Gate B22, his phone dark in her coat, the one impossible thing in a world she is done demanding explain itself. Her thumb crosses the wedding ring and, for the first time in six months, doesn’t turn it. She isn’t counting anything. A negotiator who can hold a question without forcing the answer — that isn’t the job she had. It’s the one she is starting.'},

  end_stay_bridge:{ end:true, type:'reposition', label:'Ending — The Golden Bridge', img:'st_end_bridge.png',
    title:'The Golden Bridge', maya:'connection',
    text:'“Miss the flight.” Nadia’s hand stops on the strap. “That’s the whole ask. No statements, no police, no answer tonight. Stay where I can find you, and I stay where you can find me.” The oldest move in her book — never corner them; build a bridge worth more than the exit — and she has never once run it on someone she needed. Four seconds. The gate agent watches the last passenger in the airport decide. Then the 1:55 to São Paulo pushes back with an empty seat, and two women sit at a shuttered wine bar until the terminal turns blue with morning. Nadia answers everything, and every answer comes back true-shaped both ways; the verdict never arrives, and Maya stops billing it for the delay. She still doesn’t know if she spent the night with the woman who watched Daniel die or the woman who tried to stop it. She knows she is no longer the only person fluent in him. The negotiation worked; the grief didn’t move an inch. Those were never the same hostage — nineteen years, and tonight she finally files them separately.'},

  end_stay_record:{ end:true, type:'expose', label:'Ending — On the Record', img:'end_expose.png',
    title:'On the Record', maya:'truth',
    text:'She lets the plane go — you don’t detain a maybe; that is the whole discipline in one sentence. Then, alone in an airport built for six hundred, she texts Teo: “I’m going to say all of it. Including you.” The reply takes one minute. “Say it.” She calls the reporter who wrote up the crash as weather and traffic, and gives it plainly, in the flat voice she saves for hostage lines: the overpass named three weeks early, the report that was never filed, six months of silence with her own at the top of the list. The woman at the tape line she describes and does not name — she will not hand the world a verdict she doesn’t own. Her name goes on the record; her clearance won’t survive the byline, and she did that arithmetic before her thumb moved. Nineteen years spent managing other people’s worst nights inside sealed rooms, trading truth for outcomes. Tonight she stops negotiating and testifies — no outcome purchased, no certainty attached. Just a witness, at last. She sits under the white terminal light, hands empty, phone quiet.'},

  /* ================= BRANCH C — CALL BACK (Connection) — the living line.
     His number, recycled to a prepaid in Queens. A locked phone that can only answer.
     She dialed a ghost; a seven-year-old picked up. ================= */
  call_1:{ img:'cb_dial.png', slug:'INT. GATE B22 · 11:49 PM', chapter:'Call back · the living line',
    line:'Ten digits she used to know faster than her own name. She copies them off his dead screen into her own phone — the warm one, the one that still makes calls.',
    action:'His number was disconnected the week of the funeral. She sat on hold forty minutes to do it, and a stranger thanked her for choosing them. It should play three tones and an apology now. Instead: ringing. Somewhere out in the night, a real phone, ringing on a real table.', next:'call_2'},
  call_2:{ img:'cb_answer_dark.png', slug:'ON THE LINE · SECOND RING',
    line:'Half a second of fumble, a click. A voice — with none of him in it.',
    action:'“Are you a grown-up?” Small. Seven at most, whispering the way you whisper when the house itself has gone wrong. “My mom won’t wake up. She’s on the floor and she won’t wake up.”', next:'call_3'},
  call_3:{ img:'maya_eyes.png', slug:'INT. GATE B22 · THE SNAP',
    line:'Training performs its one mercy: the grief is shelved mid-fall, and the negotiator takes her seat.',
    action:'Dead numbers rest ninety days, then get sold back to the living — somebody’s mother owns his ten digits now, on a prepaid, in Queens. Whatever put three words on a dead man’s phone at 11:47, it was not this child, and it will have to wait. A woman she cannot see is breathing wrong on a kitchen floor.', next:'call_4'},
  call_4:{ img:'cb_triage.png', slug:'INT. GATE B22 · TRIAGE',
    line:'Four questions in, she has the shape of it. The shape is bad.',
    action:'Seven years old. They moved after summer — he doesn’t know the new address. Mom breathes “like through a straw.” Battery: one red line. And the reason no help ever came: the phone is locked. A seven-year-old, alone, with a phone that will not dial out. “It only let me answer,” he says. Hers was the first call all night.', next:'call_5'},
  call_5:{ img:'cb_triage.png', slug:'INT. GATE B22 · TWO TAPS',
    line:'She merges 911 into the line with two taps she has done from command vans — softly, so the click doesn’t scare him.',
    action:'The dispatcher runs the ping: prepaid, no account address. What comes back is a circle drawn over Queens, twelve blocks wide. A circle is not a door. Everything that shrinks it from here comes out of a seven-year-old’s mouth — and overhead, the PA starts saying her name. Final boarding. London. Passenger Reyes.', next:'c2_call'},

  c2_call:{ img:'cb_gate_finalcall.png', slug:'INT. GATE B22 · FINAL CALL', chapter:'Choice — what is she to a stranger?',
    line:'The airport says her name again, to make her leave. The boy on the line doesn’t even know it yet.',
    action:'',
    timer:16, timeoutTo:'cb_script_1',
    choices:[
      {ct:'Hand It Off', cx:'The system exists for exactly this. Give dispatch everything, and make the door.', to:'cb_handoff_1', maya:'control'},
      {ct:'The Script', cx:'Stay — armored. Closed questions, no names. Personal is how you lose.', to:'cb_script_1', maya:'doubt'},
      {ct:'Her Name', cx:'Stay, and put the armor down. Give a scared kid one true thing to hold.', to:'cb_name_1', maya:'connection'},
    ]},

  /* — handoff: the professional exit, priced in full — */
  cb_handoff_1:{ img:'cb_jetbridge.png', slug:'INT. JET BRIDGE · HANDOVER',
    line:'Twenty dry seconds: age, the straw sound, one red line, the boy’s exact words. The cleanest handover of her career.',
    action:'“We’ve got it from here, ma’am.” Permission, in dispatcher flat. She is ten steps down the jet bridge when the small voice asks the merged line one more question: “Is the other lady still there?” She lets the cabin door close on the answer.', next:'end_call_handled'},

  end_call_handled:{ end:true, type:'reckon', label:'Ending — Handled', img:'cb_end_cabin.png',
    title:'Handled', maya:'control',
    text:'She makes the door at 12:04. Airplane mode — the little icon does in one tap what six months of grief could not: every line, cut at once. She works the case all night anyway, in the only jurisdiction left to her, the inside of her skull. Heathrow, 11:40 a.m. There is no callback number. There is no case ID with her name on it. Outcomes are not released to strangers — and a stranger is what she chose to be, ten steps down a jet bridge. She never learns the boy’s name. Nineteen years of never asking, and the rule finally shows her what it was always made of: not armor. Distance. In a London hotel she lies awake under the flightpath, working out which ceilings the landings shake. In her coat, his phone stays dark. Two questions now, filed in the same pocket, and no one anywhere obliged to answer either.'},

  /* — script path: the armor works, then meets the one thing it has no page for — */
  cb_script_1:{ img:'cb_kitchen_dark.png', slug:'THE KITCHEN · HIS SIDE OF THE LINE',
    line:'She goes in armored: dispatcher cadence, closed questions, one instruction at a time. It works. It always works at first.',
    action:'Is the front door locked. Is the stove off. Put your hand under her nose — do you feel wind on it. “Yes.” Good — that’s good. He performs like a soldier of seven, because a calm adult voice is the only railing in the dark and he is holding it with both hands.', next:'cb_script_2'},
  cb_script_2:{ img:'cb_kitchen_dark.png', slug:'THE KITCHEN · A SIREN, PASSING',
    line:'A siren blooms against his window — and keeps going. Somebody else’s emergency, somebody else’s kitchen. Help passing by is worse than no help at all.',
    action:'He stops answering. Not crying — gone. She can hear the tablecloth he’s hiding under. The script has pages for jumpers, barricades, a man with a deadline and a grievance. It has nothing for a child going quiet. Procedure got her here, and procedure is out of pages.', next:'cb_script_3'},
  cb_script_3:{ img:'maya_eyes.png', slug:'INT. GATE B22 · OFF SCRIPT',
    line:'“Maya. My name’s Maya. I missed my plane on purpose, and I’m not going anywhere.” Nineteen years of rules, set down where a child can hear the sound they make.',
    action:'The tablecloth shifts. A sniff, close to the phone. Then, small and formal, like a trade being honored: “I’m Jonah.” She writes it on her boarding pass, straight across LONDON — the first name she has let herself learn in nineteen years.', next:'cb_search_1'},

  /* — name path: she pays first — */
  cb_name_1:{ img:'cb_gate_finalcall.png', slug:'INT. GATE B22 · THE TRADE',
    line:'She pays first, before the armor can file an objection: her name, and one true thing to go with it.',
    action:'“Maya. I talk to people on the worst night of their lives. I’m very good at it, and I just gave my plane away to talk to you.” Four seconds while a seven-year-old audits that for lies. Then: “I’m Jonah. Mom calls me Jo when she’s not mad.” Present tense. Her whole job now is keeping it true.', next:'cb_search_1'},

  /* — convergence: the search — a location, negotiated out of a child — */
  cb_search_1:{ img:'cb_window_signs.png', slug:'THE WINDOW · WHAT A KID KNOWS',
    line:'He doesn’t know his address. He knows his world. Her whole career is the difference between those two sentences.',
    action:'Go to the window, Jonah — tell me what’s lit. “The chicken sign. Half the chicken is burned out.” What else. “The party store. And our stairs go around two times.” A broken sign, a third-floor walk-up, a party store below. On the dispatch end, the circle over Queens loses half its blocks. Behind her, small and far away, a flight to London pushes back without her.', next:'cb_search_2'},
  cb_search_2:{ img:'cb_window_plane.png', slug:'THE WINDOW · HELD OUT INTO THE NIGHT',
    line:'“Now hold the phone out the window, Jo. Let me hear your street.”',

/* the hidden path: the full-distrust run capped with exposure — Stay(doubt) → Hunt(doubt) → Hold It(doubt)
   → On the Record(truth). Exact-sequence check; unreachable from Board/Call Back (their pathCodes[0] is
   control/connection), and timeouts can never stumble into it (c_stay_final's timeout resolves to doubt) */
let pathCodes=[];
let choiceWasTimeout=false;
function resolveEnd(toKey){
  if(toKey==='end_stay_record' && pathCodes.join('.')==='doubt.doubt.doubt.truth'){ return 'end_hidden'; }
  return toKey;
}

/* ============================================================
   RUNTIME
   ============================================================ */
let node=null;
const plate=document.getElementById('plate');
const tap=document.getElementById('tap');

function setHUD(n){
  // always set (or clear) the slug explicitly — a lingering label from the previous
  // beat reads as a bug on beats that intentionally carry no location text (e.g. the cut-to-black card)
  document.getElementById('slug').textContent = n.slug || '';
  if(n.chapter) document.getElementById('chapter').textContent=n.chapter;
  document.getElementById('chapter').style.display = n.chapter? 'block':'none';
}

function go(key){
  stopTimer();
  node=STORY[key];
  if(!node){console.warn('missing node',key);return;}
  if(node.maya) remember(node.maya);
  if(node.end){ return showEnding(node); }

  show(node.img); setHUD(node);
  plate.style.display='flex';
  document.getElementById('choices').innerHTML='';
  tap.style.display='none';
  renderMayas(false);
  document.getElementById('blackout').classList.toggle('on', !!node.dim);
  // clear both text fields together, in sync with the frame/HUD reset — action was previously
  // left showing the PREVIOUS beat's text until its own typewriter call fired after line finished,
  // which reads as "old text lingers, then vanishes" instead of a clean cut like line gets
  clearInterval(typing);
  document.getElementById('line').innerHTML='';
  document.getElementById('action').innerHTML='';

  // wordless/short beats (the pre-title atmosphere shots) still need a floor —
  // otherwise an empty line+action arms "continue" instantly and the frame never registers
  const shownAt = Date.now();
  const MIN_DWELL = 1400;
  function afterDwell(fn){
    setTimeout(fn, Math.max(0, MIN_DWELL - (Date.now() - shownAt)));
  }

  // type the line, then action, then reveal interaction
  typeLine(document.getElementById('line'), node.line||'', 26, ()=>{
    typeLine(document.getElementById('action'), node.action||'', 12, ()=>{
      if(node.choices){ renderChoices(node); }
      else { afterDwell(()=>armTap(node.next)); }
    });
  });
}

function armTap(nextKey){
  tap.style.display='block';
  const handler=(e)=>{
    if(e.target.closest('.choice')||e.target.closest('.btn')) return;
    cleanup(); go(nextKey);
  };
  function cleanup(){ stage.removeEventListener('click',handler); }
  stage.addEventListener('click',handler);
}

function renderChoices(n){
  const box=document.getElementById('choices'); box.innerHTML='';
  box.style.pointerEvents='auto';   // reset (a prior timeout may have locked it)
  n.choices.forEach((c,idx)=>{
    const b=document.createElement('button'); b.className='choice';
    b.innerHTML=`<span class="ct">${c.ct}</span><span class="cx">${c.cx}</span>`;
    b.onclick=()=>{ if(c.maya)pathCodes.push(c.maya); stopTimer();
      choiceWasTimeout=false;
      go(resolveEnd(c.to)); };
    box.appendChild(b);
    setTimeout(()=>b.classList.add('in'), 120*idx+80);
  });
  if(n.timer && TIMERS_ENABLED){ runTimer(n.timer, ()=>{
      // timer runs out = the 5th outcome: the world decides for her — make it legible.
      // highlight whichever choice actually matches timeoutTo (falls back to 0 only if none match)
      box.style.pointerEvents='none';
      const btns=box.querySelectorAll('.choice');
      let idx=n.choices.findIndex(c=>c.to===n.timeoutTo);
      if(idx<0) idx=0;
      btns.forEach((b,i)=>{ b.classList.add(i===idx?'chosen':'dim'); });
      const echo=document.getElementById('echo');
      echo.textContent='she waited · the world decided';
      echo.classList.add('show');
      const fb=n.choices[idx]; if(fb.maya)pathCodes.push(fb.maya);
      choiceWasTimeout=true;
      setTimeout(()=>{ echo.classList.remove('show'); go(resolveEnd(n.timeoutTo)); }, 1800);
    });
  }
}

/* ---------- MAYA meta layer ---------- */
function renderMayas(force){
  const wrap=document.getElementById('mayas'); wrap.innerHTML='';
  const s=seen();
  MAYAS.forEach(m=>{
    const d=document.createElement('div'); d.className='mdot'+(s.includes(m)?' lit':'');
    wrap.appendChild(d);
  });
  wrap.classList.toggle('show', force || s.length>0);
}

/* ---------- ending ---------- */
function showEnding(n){
  remember(n.maya);
  show(n.img); setHUD({slug:n.label});
  plate.style.display='none'; tap.style.display='none';
  stopTimer();
  const fill=document.getElementById('timerfill'); fill.style.transform='scaleX(1)';
  setTimeout(()=>{
    document.getElementById('endtype').className='endtype et-'+(n.type==='reckon'?'reckon':n.type);
    document.getElementById('endtype').textContent=n.label;
    document.getElementById('endtitle').textContent=n.title;
    document.getElementById('endtext').textContent=n.text;
    const s=seen();
    document.getElementById('metaBtn').textContent = s.length>=5
      ? 'All five Mayas seen — ▷'
      : `Mayas you’ve become: ${s.length}/5 — find the rest`;
    document.getElementById('ending').classList.remove('hide');
    renderMayas(true);
  }, 1400);
  bumpPlays();
}

/* ---------- title / lifecycle ---------- */
function startGame(){
  pathCodes=[];
  document.getElementById('title').classList.add('hide');
  renderMayas(true);
  setTimeout(()=>go('neg1'), 700);
}
/* TEMP DEV SHORTCUT — remove before shipping. Jumps straight to the trunk's
   end-card choice (c1: Board/Stay/Call Back) so branch content can be
   re-tested without replaying the whole trunk each time. */
function skipToChoice(){
  pathCodes=[];
  document.getElementById('title').classList.add('hide');
  renderMayas(true);
  setTimeout(()=>go('c1'), 200);
}
function replay(){
  document.getElementById('ending').classList.add('hide');
  pathCodes=[];
  // returning-player echo: the world remembers
  const s=seen();
  const echo=document.getElementById('echo');
  if(s.length>0){
    echo.textContent = s.length>=5 ? 'every Maya remembers' : 'she has been here before';
    echo.classList.add('show'); setTimeout(()=>echo.classList.remove('show'),2600);
  }
  setTimeout(()=>{ document.getElementById('title').classList.remove('hide'); refreshReturnNote(); }, 400);
}
function refreshReturnNote(){
  const s=seen(), p=plays(); const note=document.getElementById('returnNote');
  if(p>0){ note.style.opacity='1';
    note.textContent = s.length>=5
      ? 'You have seen all five. Now watch someone else play.'
      : `Return ${p} · ${s.length}/5 Mayas · she is different this time`;
  }
}
if(!TIMERS_ENABLED){ const tb=document.querySelector('.timerbar'); if(tb) tb.style.display='none'; }
refreshReturnNote(); renderMayas(true);
</script>
