<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<!-- CONFIDENTIAL · LAST CALL / MAYA — unreleased WIP. Do not share beyond the invited focus group. -->
<title>LAST CALL — an interactive drama</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --maya-cold:#9db4d4;
  --maya-ice:#e8f1fb;
  --accent:#6f8fff;
  --warn:#e0564f;
  --mono:'IBM Plex Mono',monospace;
  --serif:'Playfair Display',serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#04060c;overflow:hidden}
body{display:flex;align-items:center;justify-content:center;font-family:var(--mono)}

#stage{
  position:relative;
  width:min(100vw,calc(100vh * 9 / 16));
  height:min(100vh,calc(100vw * 16 / 9));
  background:#04060c;overflow:hidden;
  box-shadow:0 0 80px rgba(0,0,0,0.9);
}

/* ---- frame layers (crossfade + ken burns) ---- */
.frame{
  position:absolute;inset:0;
  background-size:cover;background-position:center 40%;   /* bias toward headroom */
  opacity:0;transition:opacity 1.1s ease;
  will-change:transform,opacity;
}
.frame.show{opacity:1;animation:kb 22s ease-out forwards}
@keyframes kb{               /* gentle centered push, no vertical drift — protects composition */
  from{transform:scale(1.0)}
  to{transform:scale(1.055)}
}
.vignette{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(120% 80% at 50% 35%,transparent 40%,rgba(2,4,10,0.55) 100%)}
.grade{position:absolute;inset:0;pointer-events:none;mix-blend-mode:soft-light;
  background:linear-gradient(180deg,rgba(60,110,180,0.20),rgba(10,20,40,0.10))}
/* guarantees HUD text stays legible no matter how bright the frame underneath is */
.hud-scrim{position:absolute;top:0;left:0;right:0;height:120px;z-index:5;pointer-events:none;
  background:linear-gradient(180deg,rgba(2,4,10,0.6) 0%,rgba(2,4,10,0) 100%)}

/* ---- top HUD ---- */
.hud{position:absolute;top:0;left:0;right:0;padding:16px 18px;z-index:6;
  display:flex;justify-content:space-between;align-items:flex-start;
  font-size:10px;letter-spacing:0.14em;color:rgba(228,238,251,0.88);text-transform:uppercase;
  text-shadow:0 1px 4px rgba(0,0,0,0.7),0 1px 10px rgba(0,0,0,0.4)}
.hud .slug{max-width:60%}
.hud .meta{text-align:right;line-height:1.6}
.timerbar{position:absolute;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.14);z-index:7}
.timerfill{height:100%;width:100%;background:linear-gradient(90deg,var(--accent),var(--warn));
  transform-origin:left;transition:transform 0.1s linear}
/* last third of the countdown: an unmissable pulsing glow, since the eye is on the choices, not the top edge */
.timerbar.urgent{animation:timerurgent 0.6s ease-in-out infinite}
@keyframes timerurgent{0%,100%{box-shadow:0 0 0 rgba(224,86,79,0)}50%{box-shadow:0 8px 18px -3px rgba(224,86,79,0.75)}}

/* ---- text plate ---- */
.plate{position:absolute;left:0;right:0;bottom:0;z-index:6;
  padding:26px 22px 26px;
  display:flex;flex-direction:column;
  background:linear-gradient(0deg,rgba(3,5,11,0.96) 0%,rgba(3,5,11,0.82) 55%,transparent 100%)}
.chapter{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--maya-cold);margin-bottom:12px;opacity:0.95}
.line{font-family:var(--serif);font-size:19px;line-height:1.6;color:var(--maya-ice);
  font-style:italic;margin-bottom:10px;min-height:1.6em}
.action{font-size:12.5px;line-height:1.65;color:rgba(210,226,248,0.9);margin-bottom:18px;
  font-family:var(--mono)}
.cursor{display:inline-block;width:7px;height:1.05em;vertical-align:-2px;
  background:var(--maya-ice);margin-left:2px;animation:blink 1s steps(1) infinite;opacity:0.8}
@keyframes blink{50%{opacity:0}}

/* ---- choices ---- */
.choices{display:flex;flex-direction:column;gap:9px}
.choice{appearance:none;border:0.5px solid rgba(140,175,225,0.32);
  background:rgba(20,32,54,0.5);backdrop-filter:blur(6px);
  border-radius:11px;padding:13px 15px;text-align:left;cursor:pointer;
  transition:border-color .18s,background .18s,transform .18s;opacity:0;transform:translateY(8px)}
.choice.in{opacity:1;transform:translateY(0)}
.choice:hover,.choice:focus{border-color:var(--accent);background:rgba(34,52,86,0.7);outline:none}
.choice .ct{display:block;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--maya-cold);margin-bottom:5px}
.choice .cx{display:block;font-size:13.5px;line-height:1.45;color:var(--maya-ice)}
.choice.dim{opacity:0.2;filter:saturate(0.5);transition:opacity .5s,filter .5s}
.choice.chosen{border-color:var(--warn);background:rgba(224,86,79,0.16);
  box-shadow:0 0 22px rgba(224,86,79,0.25);transition:.4s}

/* ---- tap-to-advance hint — a real button, in-flow so it always sits below the text ---- */
.tap{align-self:flex-end;margin-top:6px;font-size:11px;letter-spacing:0.1em;
  text-transform:uppercase;color:rgba(232,241,251,0.92);
  background:rgba(20,32,54,0.55);backdrop-filter:blur(6px);
  border:0.5px solid rgba(140,175,225,0.45);border-radius:20px;padding:9px 16px;
  animation:tappulse 1.8s ease-in-out infinite}
@keyframes tappulse{0%,100%{opacity:0.82}50%{opacity:1}}

/* ---- title / ending overlays ---- */
.curtain{position:absolute;inset:0;z-index:10;background:#04060c;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;transition:opacity 1s ease}
.curtain.hide{opacity:0;pointer-events:none}
/* ending keeps the final frame in view, scrimmed — the climax stays cinematic, not a slide */
#ending{background:linear-gradient(180deg,rgba(4,6,12,0.5) 0%,rgba(4,6,12,0.72) 45%,rgba(4,6,12,0.96) 100%)}
.curtain .mark{font-size:11px;letter-spacing:0.4em;color:var(--maya-cold);text-transform:uppercase;margin-bottom:18px}
.curtain h1{font-family:var(--serif);font-size:46px;font-weight:600;color:var(--maya-ice);
  letter-spacing:0.02em;line-height:1;margin-bottom:16px}
.curtain .tag{font-family:var(--serif);font-style:italic;font-size:15px;color:rgba(205,222,245,0.7);
  max-width:80%;line-height:1.6;margin-bottom:34px}
.btn{appearance:none;border:0.5px solid var(--accent);background:rgba(111,143,255,0.12);
  color:var(--maya-ice);font-family:var(--mono);font-size:12px;letter-spacing:0.1em;
  text-transform:uppercase;padding:13px 26px;border-radius:30px;cursor:pointer;transition:.18s}
.btn:hover{background:var(--accent);color:#04060c}
.btn.ghost{border-color:rgba(140,175,225,0.3);background:transparent;margin-top:10px}

/* ending */
.endtype{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;padding:5px 14px;border-radius:20px;
  margin-bottom:18px;display:inline-block}
.et-reckon{background:rgba(224,86,79,0.14);color:#f0a9a4;border:0.5px solid rgba(224,86,79,0.4)}
.et-reposition{background:rgba(111,143,255,0.14);color:#aebcff;border:0.5px solid rgba(111,143,255,0.4)}
.et-expose{background:rgba(224,180,79,0.14);color:#f0d6a4;border:0.5px solid rgba(224,180,79,0.4)}
.et-hidden{background:rgba(160,120,255,0.16);color:#cdb6ff;border:0.5px solid rgba(160,120,255,0.5)}
.et-doubt{background:rgba(157,180,212,0.10);color:#9db4d4;border:0.5px solid rgba(157,180,212,0.35)}

/* MAYA meta layer */
.mayas{position:absolute;top:54px;left:18px;z-index:6;display:flex;gap:5px;opacity:0;transition:opacity .6s}
.mayas.show{opacity:1}
.mdot{width:7px;height:7px;border-radius:50%;border:0.5px solid var(--maya-cold);background:transparent}
.mdot.lit{background:var(--maya-cold);box-shadow:0 0 8px var(--maya-cold)}
.echo{position:absolute;top:50px;left:0;right:0;z-index:6;text-align:center;
  font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--maya-cold);
  opacity:0;transition:opacity .8s}
.echo.show{opacity:0.85}

.fade-black{position:absolute;inset:0;background:#04060c;z-index:9;opacity:0;pointer-events:none;transition:opacity .5s}
.fade-black.on{opacity:1}
/* darkens the CURRENT frame instead of cutting to a blank one — reads as a fade, not a broken load */
.blackout{position:absolute;inset:0;z-index:5;background:#04060c;opacity:0;pointer-events:none;transition:opacity 1.6s ease}
.blackout.on{opacity:0.9}
</style>
</head>
<body>
<div id="stage">
  <div class="frame" id="fA"></div>
  <div class="frame" id="fB"></div>
  <div class="vignette"></div>
  <div class="grade"></div>
  <div class="hud-scrim"></div>
  <div class="blackout" id="blackout"></div>
  <div class="fade-black" id="fadeblk"></div>

  <div class="timerbar"><div class="timerfill" id="timerfill"></div></div>
  <div class="hud">
    <div class="slug" id="slug">INT. JFK T4 · GATE B22 · 11:47 PM</div>
    <div class="meta" id="meta" style="opacity:0.35">build 025.1</div>
  </div>
  <div class="mayas" id="mayas"></div>
  <div class="echo" id="echo"></div>

  <div class="plate" id="plate" style="display:none">
    <div class="chapter" id="chapter"></div>
    <div class="line" id="line"></div>
    <div class="action" id="action"></div>
    <div class="choices" id="choices"></div>
    <div class="tap" id="tap" style="display:none">continue ›</div>
  </div>

  <!-- TITLE -->
  <div class="curtain" id="title">
    <div class="mark">M A Y A &nbsp;·&nbsp; title 01</div>
    <h1>LAST&nbsp;CALL</h1>
    <div class="tag">A choice. A consequence. A life that isn’t yours anymore.</div>
    <button class="btn" onclick="startGame()">Begin</button>
    <button class="btn ghost" onclick="skipToChoice()" style="margin-top:14px;opacity:0.6">TEMP — Skip to choice</button>
    <div id="returnNote" style="margin-top:22px;font-size:10px;letter-spacing:0.12em;color:var(--maya-cold);text-transform:uppercase;opacity:0"></div>
  </div>

  <!-- ENDING -->
  <div class="curtain hide" id="ending">
    <div class="endtype" id="endtype"></div>
    <h1 style="font-size:34px" id="endtitle"></h1>
    <div class="tag" id="endtext"></div>
    <button class="btn" onclick="replay()">Play again</button>
    <button class="btn ghost" id="metaBtn" onclick="replay()"></button>
  </div>
</div>

<script>
/* ============================================================
   LAST CALL — deterministic playable engine
   Real frames · locked spine · replay-aware (MAYA layer)
   ============================================================ */

const F = 'frames/';
/* TESTING PHASE: timers off — isolating story pull / stickiness from the time-pressure mechanic.
   Flip to true to restore the countdown + "the world decides" 5th-outcome behavior. */
const TIMERS_ENABLED = false;
const stage = document.getElementById('stage');
let layerTop = document.getElementById('fA');
let layerBot = document.getElementById('fB');
let curImg = null;

/* ---------- persistent memory: the MAYA layer ---------- */
const MAYAS = ['control','doubt','connection','truth','love'];
function seen(){ try{return JSON.parse(localStorage.getItem('lc_mayas')||'[]')}catch(e){return[]} }
function remember(m){ const s=seen(); if(!s.includes(m)){s.push(m);localStorage.setItem('lc_mayas',JSON.stringify(s));} }
function plays(){ return +(localStorage.getItem('lc_plays')||0); }
function bumpPlays(){ localStorage.setItem('lc_plays', plays()+1); }

/* ---------- frame swap ---------- */
function show(img){
  if(img===curImg) return;
  curImg=img;
  const incoming = layerBot;
  incoming.style.backgroundImage = `url('${F}${img}')`;
  incoming.classList.remove('show'); void incoming.offsetWidth;
  incoming.classList.add('show');
  layerTop.classList.remove('show');
  const t=layerTop; layerTop=incoming; layerBot=t;
}

/* ---------- typewriter ---------- */
let typing=null;
function typeLine(el, txt, speed, done){
  clearInterval(typing); el.innerHTML='';
  if(!txt){ if(done)done(); return; }
  let i=0; const cur=document.createElement('span'); cur.className='cursor';
  el.appendChild(cur);
  typing=setInterval(()=>{
    if(i>=txt.length){clearInterval(typing); cur.remove(); if(done)done(); return;}
    cur.insertAdjacentText('beforebegin', txt[i]); i++;
  }, speed);
}

/* ---------- timer (choice pressure) ---------- */
let timer=null, urgentTimer=null;
function runTimer(sec, onExpire){
  const fill=document.getElementById('timerfill');
  const bar=document.querySelector('.timerbar');
  fill.style.transition='none'; fill.style.transform='scaleX(1)';
  void fill.offsetWidth;
  fill.style.transition=`transform ${sec}s linear`; fill.style.transform='scaleX(0)';
  bar.classList.remove('urgent');
  clearTimeout(timer); clearTimeout(urgentTimer);
  timer=setTimeout(onExpire, sec*1000);
  urgentTimer=setTimeout(()=>bar.classList.add('urgent'), sec*1000*0.65);
}
function stopTimer(){ clearTimeout(timer); clearTimeout(urgentTimer);
  const fill=document.getElementById('timerfill'); fill.style.transition='none';
  const bar=document.querySelector('.timerbar'); if(bar) bar.classList.remove('urgent');
}

/* ============================================================
   STORY GRAPH — nodes. type: 'beat' (tap) or 'choice' or 'end'
   img = frame · line = Maya voice (serif) · action = stage dir
   ============================================================ */
const STORY = {

  /* ---------------- THE NEGOTIATION (new cold open · only Maya · raises stakes, establishes her) ---------------- */
  neg1:{ img:'neg1_rooftop.png', slug:'EXT. ROOFTOP · TWENTY STORIES UP',
    line:'', action:'A rooftop, twenty stories up. Wind with teeth in it. Down on the street, sirens that started an hour ago and haven’t once stopped.',
    next:'neg2' },
  neg2:{ img:'neg2_listening.png', slug:'EXT. ROOFTOP · FIFTY MINUTES IN',
    line:'Fifty minutes on this call. Her voice has never once left the register you’d use to say good morning.',
    action:'', next:'neg3' },
  neg3:{ img:'neg2_listening.png', slug:'EXT. ROOFTOP · FIFTY MINUTES IN',
    line:'“I won’t lie to you. I don’t know if it gets better. I know you’re still here. Right now that’s the only fact I need.”',
    action:'On the line: a voice, young, coming apart. She doesn’t flinch. Her thumb strokes once across the inside of her wrist — a habit that was never hers. She stopped feeling herself do it months ago.',
    next:'neg4' },
  neg4:{ img:'neg4_after.png', slug:'EXT. ROOFTOP · AFTER',
    line:'It ends. One long breath, and nothing else. Celebrating is a thing she trained out of herself.',
    action:'Below, they walk a kid back from the edge, an arm on each shoulder. She will never learn the name. She never asks. Names make it personal. Personal is how you lose. She learned that the week they buried him. Closed casket, and the paperwork closed faster than the dental records ever came back.',
    next:'open1' },

  /* ---------------- OPENING (wound before hook · ~25s muted) ---------------- */
  // op1 — TRANSITION (from professional competence to personal blank page)
  open1:{ img:'00_hero.png', slug:'INT. JFK T4 · GATE B22 · 11:47 PM',
    line:'Nineteen years of knowing the exact next word. Tonight her mouth is empty.',
    action:'London. The request came through channels she thought she’d sealed off — and it asked for her by name. She could have said no. She has never once said no.', next:'open2' },

  // op2 — ISOLATION (the world swallows her)
  open2:{ img:'maya_wide.png', slug:'INT. JFK T4 · THE LAST FLIGHT',
    line:'The terminal streams around her — rolling bags, final calls, everyone pulled toward somewhere. She hasn’t moved in eleven minutes.',
    action:'', next:'pt02' },

  // his phone, not hers — an archive, not a line. detonates in open5 precisely because it has no signal.
  pt02:{ img:'phone_archive.png', slug:'HER COAT POCKET · SIX MONTHS OF IT',
    line:'', action:'A phone. Not hers. His — riding in her coat for six months. No missed calls. He can’t call. Only what he left behind: one voicemail, forty-one seconds, never played. A photo folder she can’t bring herself to delete. Her number, still saved as “Home.” Her hand turns it face-down. Walks away.',
    next:'open3' },

  // op3 — THE WOUND (the object, not the count — carried, inert, sacred)
  open3:{ img:'phone_archive.png', slug:'HER COAT POCKET · SIX MONTHS OF IT',
    line:'Every day for six months. No signal, no service. It doesn’t need one.',
    action:'She knows its weight the way she knows her own pulse — through the coat, without looking. Tonight, for the first time, she leaves it face-up.',
    next:'open4' },

  // op4 — THE CRACK (the eyes carry what the face won't; ring detail — kept per direction, no visible-jewelry conflict since this beat is an eyes ECU)
  open4:{ img:'maya_eyes.png', slug:'INT. GATE B22 · 11:48 PM',
    line:'Six months a widow. She still wears the ring. She has trained herself to stop turning it when anyone is watching.',
    action:'', next:'open5' },

  // op5 — THE HOOK (now it lands — the call she cannot ignore)
  open5:{ img:'01_dontgeton.png', slug:'A MESSAGE · FROM A DEAD MAN',
    line:'His number was disconnected the week of the funeral. She made that call herself.',
    action:'It lights up. No signal. Six months dark. And it has something to say. One name: DANIEL. Three words: “Don’t get on.”',
    next:'c1' },

  /* ---------------- CHOICE 1 — THE GATE ---------------- */
  c1:{ img:'03_gate_choice.png', slug:'INT. GATE B22 · 4:00 TO DEPARTURE', chapter:'Choice — who is Maya right now?',
    line:'From her seat she can still see the jet bridge door. Open. The queue is down to a handful — shorter than her list of reasons to stay in this chair.',
    action:'',
    timer:18, timeoutTo:'reveal_board',
    choices:[
      {ct:'Board', cx:'London is waiting. She told you herself: she never says no.', to:'reveal_board', maya:'control'},
      {ct:'Stay',  cx:'Something is wrong. You don’t fly into wrong.', to:'reveal_stay', maya:'doubt'},
      {ct:'Call back', cx:'Six months of not answering him. Answer him now.', to:'reveal_call', maya:'connection'},
    ]},

  /* ---------------- IDENTITY REVEAL (choice lands before interiority explains it — she tells you who she is, not the other way round) ---------------- */
  reveal_board:{ img:'03_gate_choice.png', dim:true, slug:'INT. GATE B22 · A DECISION MADE',
    line:'Control.', action:'Nineteen years of choosing her words — and she didn’t mean to say that one.', next:'board_1' },
  reveal_stay:{ img:'03_gate_choice.png', dim:true, slug:'INT. GATE B22 · A DECISION MADE',
    line:'Doubt.', action:'Nineteen years of choosing her words — and she didn’t mean to say that one.', next:'stay_1' },
  reveal_call:{ img:'03_gate_choice.png', dim:true, slug:'INT. GATE B22 · A DECISION MADE',
    line:'Connection.', action:'Nineteen years of choosing her words — and she didn’t mean to say that one.', next:'call_1' },

  /* ================= BRANCH A — BOARD (Control) — the London payoff: Cranmer House, Flat 74.
     Requested by name = the hostage-taker named her. Sealed channels = the sealed inquiry office. ================= */
  board_1:{ img:'board_jetbridge.png', slug:'INT. JET BRIDGE · 11:51 PM', chapter:'Board · the crossing',
    line:'“Don’t get on.” She got on. Nineteen years of walking toward the thing everyone else is running from — she wasn’t going to break the streak for a text message.',
    action:'The cabin door thunks shut behind her. In her coat, his phone is dark again. It said its piece.', next:'board_2'},
  board_2:{ img:'board_seated.png', slug:'INT. CABIN · 14A · WHEELS UP',
    line:'Tasking order, four lines, read eleven times before wheels-up: Cranmer House. Flat 74. Subject requests Reyes, by name.',
    action:'Nineteen years, and exactly one address has ever asked for her by name before boarding. She signs inside the hour, the ring catching light on the downstroke of her own name — the last time she signed anything this fast, it wasn’t hers to sign either. She flies back to stand in a doorway she left eleven years ago, and says yes anyway.', next:'board_3'},
  board_3:{ img:'board_face.png', slug:'INT. CABIN · OVER THE ATLANTIC · 3:12 AM',
    line:'Six hours to think about a door she’s thought about every day for eleven years. She spends every one of them not doing that.',
    action:'Ops updates come twice an hour, clipped and procedural — petrol confirmed, two occupants beyond the subject, deadline nine a.m. Nothing about Callum she didn’t already carry onto this plane. Composure is a discipline, not a feeling; she keeps hers exactly as trained, until Heathrow’s lights rise under the wing and her thumb finds the ring without asking permission first.', next:'board_4'},
  board_4:{ img:'bd_descent.png', slug:'INT. CABIN · DESCENT INTO HEATHROW · DAWN',
    line:'London surfaces grey through the cloud — a city that files its disasters and reissues the flats.',
    action:'Wheels down at 6:40. Her hand goes to her coat pocket before she’s decided to let it — an old habit that lands you safe, you tell him. The screen stays dark; there’s no one left on the other end of that reflex. A liaison officer says her name at the jet bridge like a fact he was sent to verify. Blue light the whole M4 in, and neither of them wastes it on talk.', next:'board_5'},
  board_5:{ img:'bd_cordon.png', slug:'EXT. CRANMER HOUSE · 7:26 AM',
    line:'Eleven years and the tower hasn’t moved. She touches the ring once and gets out of the car.',
    action:'Hale is already at the tape, talking fast — petrol, one lighter, no demands but her, deadline nine a.m. Breach is off the table; one spark does his job for him.', next:'c_board_2'},

  /* NEW — fixes the inert middle: a real tactical decision before Hale finishes talking */
  c_board_2:{ img:'bd_cordon.png', slug:'EXT. CRANMER HOUSE · THE TAPE LINE', chapter:'Choice — ninety seconds',
    line:'Hale wants her at his shoulder for the full brief. Four floors up, a curtain moves and doesn’t move back.',
    action:'',
    timer:14, timeoutTo:'board_scout_brief',
    choices:[
      {ct:'The Alley', cx:'Duck the tape. Get eyes on that window before anyone tells her not to.', to:'board_scout_alley', maya:'truth'},
      {ct:'The Brief', cx:'Stay at his shoulder. Take the floor plan, the exits, the whole picture first.', to:'board_scout_brief', maya:'control'},
    ]},

  board_scout_alley:{ img:'bd_scout_alley.png', slug:'EXT. CRANMER HOUSE · THE ALLEY',
    line:'She’s over the tape before the constable finishes saying her name.',
    action:'Four floors up, a gap in the curtain — a flicker, low, orange, gone. She has a location for the lighter no briefing gave her, and a look from Hale that says she’ll hear about this later.', next:'board_reveal_alley'},

  board_scout_brief:{ img:'bd_scout_brief.png', slug:'EXT. CRANMER HOUSE · THE COMMAND TENT',
    line:'She stays at Hale’s shoulder and lets the picture build before she moves an inch.',
    action:'Floor plan, exits, a marksman already in position two rooftops back — everything Command knows, in under a minute. Instinct can wait its turn.', next:'board_reveal_brief'},

  /* — scar thread A: unauthorized alley move costs her Hale's patience downstream — */
  board_reveal_alley:{ img:'bd_document.png', slug:'EXT. CRANMER HOUSE · ONE MORE THING',
    line:'“One more thing.” Hale closes the file and doesn’t move. “Your name didn’t come from Callum.”',
    action:'An old document from the back of the file — creased, scanned twice, years old, attached to the original Doyle case, the one that cost Mairead her life and put Callum in care at twelve. A standing instruction, not a warning about tonight: IF THIS FAMILY BECOMES ACTIVE AGAIN, REQUEST DET. MAYA REYES. Signature checked against his service record before anyone let her see it. At the bottom: DANIEL REYES.', next:'board_reveal_2_alley'},

  /* — post-Counted contaminated twin: same reveal, recolored by what she's since heard on the line — */
  board_reveal_alley_contaminated:{ img:'bd_document.png', slug:'EXT. CRANMER HOUSE · ONE MORE THING',
    line:'“One more thing.” Hale closes the file and doesn’t move. “Your name didn’t come from Callum.”',
    action:'An old document from the back of the file — creased, scanned twice, years old, attached to the original Doyle case, the one that cost Mairead her life and put Callum in care at twelve. A standing instruction, not a warning about tonight: IF THIS FAMILY BECOMES ACTIVE AGAIN, REQUEST DET. MAYA REYES. Signature checked against his service record before anyone let her see it. At the bottom: DANIEL REYES. She knows now what she didn’t the first time she stood here — that a phone can ring, and someone can let it, and still be listening on the other end. She can’t prove he touched this file since. She also can’t prove he didn’t.', next:'board_reveal_2_alley'},
  board_reveal_2_alley:{ img:'bd_reveal_face.png', slug:'EXT. CRANMER HOUSE · THE WORD THAT COSTS',
    line:'“You knew about this?” — “No.” For the first time tonight, the word costs her something.',
    action:'She looks up at Cranmer House. In her pocket, his message: DON’T GET ON. And now she is standing exactly where getting on brought her.', next:'c_board_1_alley'},
